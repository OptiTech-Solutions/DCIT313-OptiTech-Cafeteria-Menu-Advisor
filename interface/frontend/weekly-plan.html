<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weekly Plan</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page">
      <div id="navbar"></div>
      <main class="container">
        <section class="hero">
          <div>
            <span class="pill">Weekly Planner</span>
            <h1>Generate a 7-day cafeteria plan.</h1>
            <p>Use your preferences to rotate through meals and keep variety across the week.</p>
          </div>
          <div class="hero-card">
            <strong>Plan output</strong>
            <p class="hint">Download your weekly plan as a text file fter generation.</p>
            <button class="btn-outline" id="download-plan" type="button">Download plan</button>
          </div>
        </section>

        <section class="section">
          <form class="form" id="plan-form">
            <div class="form-row">
              <div>
                <label for="category">Student category</label>
                <select id="category" name="category" required>
                  <option value="gym">Gym</option>
                  <option value="veg">Vegetarian</option>
                  <option value="non_veg">Non-vegetarian</option>
                  <option value="none">None</option>
                </select>
              </div>
              <div>
                <label for="goal">Nutrition goal</label>
                <select id="goal" name="goal" required>
                  <option value="balanced">Balanced</option>
                  <option value="high_protein">High protein</option>
                  <option value="low_carb">Low carb</option>
                  <option value="low_fat">Low fat</option>
                </select>
              </div>
              <div>
                <label for="health">Health objective</label>
                <select id="health" name="health" required>
                  <option value="none">None</option>
                  <option value="wl">Weight loss</option>
                  <option value="wg">Weight gain</option>
                </select>
              </div>
              <div>
                <label for="meal_type">Meal type</label>
                <select id="meal_type" name="meal_type" required>
                  <option value="lunch">Lunch</option>
                  <option value="breakfast">Breakfast</option>
                  <option value="dinner">Dinner</option>
                  <option value="snack">Snack</option>
                </select>
              </div>
              <div>
                <label for="convenience">Convenience</label>
                <select id="convenience" name="convenience" required>
                  <option value="none">None</option>
                  <option value="quick">Quick</option>
                </select>
              </div>
            </div>
            <div class="tag-row">
              <button class="btn-primary" type="submit">Generate weekly plan</button>
              <button class="btn-secondary" type="button" id="reset">Reset</button>
            </div>
            <div class="status" id="status">Fill out preferences to generate a plan.</div>
          </form>
        </section>

        <section class="section">
          <h2>Weekly plan</h2>
          <div class="list" id="plan-list"></div>
        </section>
      </main>
      <div id="footer"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/weekly-plan.js"></script>
  </body>
</html>
